name: Build Erlang/OTP

on:
  workflow_dispatch:
    inputs:
      otp_version:
        description: 'OTP version to build (e.g., 27.0, 28.0-rc1)'
        required: true
        type: string
      skip_release:
        description: 'Skip creating GitHub release (for testing)'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [build-otp]

env:
  OTP_VERSION: ${{ inputs.otp_version || github.event.client_payload.otp_version || '27.0' }}

jobs:
  # ====================
  # Linux AMD64 Builds (Native Ubuntu)
  # ====================
  build-ubuntu-amd64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            distro: ubuntu2204
          - os: ubuntu-24.04
            distro: ubuntu2404

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            curl \
            libncurses5-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpng-dev \
            libssh-dev \
            unixodbc-dev \
            xsltproc \
            fop \
            libxml2-utils \
            dpkg-dev
          sudo apt-get install -y libwxgtk3.2-dev || sudo apt-get install -y libwxgtk3.0-gtk3-dev || true

      - name: Download OTP source
        run: |
          curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
            -o otp_src.tar.gz
          tar xzf otp_src.tar.gz
          mv otp_src_${OTP_VERSION} otp_src

      - name: Build OTP
        run: |
          cd otp_src
          export ERL_TOP=$(pwd)
          ./configure \
            --prefix=/usr/local \
            --enable-threads \
            --enable-smp-support \
            --enable-kernel-poll \
            --enable-ssl \
            --enable-dynamic-ssl-lib \
            --with-ssl \
            --enable-jit
          make -j$(nproc)

      - name: Install to staging directory
        run: |
          cd otp_src
          make DESTDIR=$(pwd)/../install install

      - name: Create tarball
        run: |
          cd install
          tar czf ../erlang-${OTP_VERSION}-linux-amd64.tar.gz .

      - name: Create .deb package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${OTP_VERSION} amd64 ${{ matrix.distro }}
          mv *.deb erlang-${OTP_VERSION}-${{ matrix.distro }}-amd64.deb || true

      - name: Generate checksums
        run: |
          sha256sum erlang-${OTP_VERSION}-linux-amd64.tar.gz > checksums-${{ matrix.distro }}-amd64.txt
          sha256sum *.deb >> checksums-${{ matrix.distro }}-amd64.txt 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-${{ matrix.distro }}-amd64
          path: |
            erlang-*.tar.gz
            *.deb
            checksums-*.txt

  # ====================
  # Linux ARM64 Builds (Native GitHub ARM64 runners)
  # ====================
  build-ubuntu-arm64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            distro: ubuntu2404

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            curl \
            libncurses5-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpng-dev \
            libssh-dev \
            unixodbc-dev \
            xsltproc \
            fop \
            libxml2-utils \
            dpkg-dev
          sudo apt-get install -y libwxgtk3.2-dev || sudo apt-get install -y libwxgtk3.0-gtk3-dev || true

      - name: Download OTP source
        run: |
          curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
            -o otp_src.tar.gz
          tar xzf otp_src.tar.gz
          mv otp_src_${OTP_VERSION} otp_src

      - name: Build OTP
        run: |
          cd otp_src
          export ERL_TOP=$(pwd)
          ./configure \
            --prefix=/usr/local \
            --enable-threads \
            --enable-smp-support \
            --enable-kernel-poll \
            --enable-ssl \
            --enable-dynamic-ssl-lib \
            --with-ssl
          make -j$(nproc)

      - name: Install to staging directory
        run: |
          cd otp_src
          make DESTDIR=$(pwd)/../install install

      - name: Create tarball
        run: |
          cd install
          tar czf ../erlang-${OTP_VERSION}-linux-arm64.tar.gz .

      - name: Create .deb package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${OTP_VERSION} arm64 ${{ matrix.distro }}
          mv *.deb erlang-${OTP_VERSION}-${{ matrix.distro }}-arm64.deb || true

      - name: Generate checksums
        run: |
          sha256sum erlang-${OTP_VERSION}-linux-arm64.tar.gz > checksums-${{ matrix.distro }}-arm64.txt
          sha256sum *.deb >> checksums-${{ matrix.distro }}-arm64.txt 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-${{ matrix.distro }}-arm64
          path: |
            erlang-*.tar.gz
            *.deb
            checksums-*.txt

  # ====================
  # Linux AMD64 Builds (Debian containers)
  # ====================
  build-debian-amd64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: debian:11
            distro: debian11
          - container: debian:12
            distro: debian12

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y ca-certificates curl git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get install -y \
            build-essential \
            autoconf \
            libncurses5-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpng-dev \
            libssh-dev \
            unixodbc-dev \
            xsltproc \
            fop \
            libxml2-utils \
            dpkg-dev
          apt-get install -y libwxgtk3.2-dev || apt-get install -y libwxgtk3.0-gtk3-dev || true

      - name: Download OTP source
        run: |
          curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
            -o otp_src.tar.gz
          tar xzf otp_src.tar.gz
          mv otp_src_${OTP_VERSION} otp_src

      - name: Build OTP
        run: |
          cd otp_src
          export ERL_TOP=$(pwd)
          ./configure \
            --prefix=/usr/local \
            --enable-threads \
            --enable-smp-support \
            --enable-kernel-poll \
            --enable-ssl \
            --enable-dynamic-ssl-lib \
            --with-ssl \
            --enable-jit
          make -j$(nproc)

      - name: Install to staging directory
        run: |
          cd otp_src
          make DESTDIR=$(pwd)/../install install

      - name: Create tarball
        run: |
          cd install
          tar czf ../erlang-${OTP_VERSION}-linux-amd64.tar.gz .

      - name: Create .deb package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${OTP_VERSION} amd64 ${{ matrix.distro }}
          mv *.deb erlang-${OTP_VERSION}-${{ matrix.distro }}-amd64.deb || true

      - name: Generate checksums
        run: |
          sha256sum erlang-${OTP_VERSION}-linux-amd64.tar.gz > checksums-${{ matrix.distro }}-amd64.txt
          sha256sum *.deb >> checksums-${{ matrix.distro }}-amd64.txt 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-${{ matrix.distro }}-amd64
          path: |
            erlang-*.tar.gz
            *.deb
            checksums-*.txt

  # ====================
  # Linux AMD64 Builds (Rocky Linux via Docker)
  # ====================
  build-rocky-amd64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build in Rocky Linux container
        run: |
          docker pull rockylinux:9
          docker run --rm -t \
            -v "$PWD:/src" -w /src \
            -e OTP_VERSION=${OTP_VERSION} \
            rockylinux:9 bash -lc '
              set -euo pipefail

              # Clean and refresh repos
              dnf -y clean all
              dnf -y makecache --refresh

              # Enable CRB repo (needed for some devel packages)
              dnf -y install dnf-plugins-core
              dnf -y config-manager --set-enabled crb || true

              # Install build dependencies (--allowerasing to handle curl-minimal conflict)
              dnf -y install epel-release || true
              dnf -y install --allowerasing \
                gcc gcc-c++ make \
                autoconf \
                ncurses-devel \
                openssl-devel \
                mesa-libGL-devel \
                mesa-libGLU-devel \
                libpng-devel \
                libssh-devel \
                unixODBC-devel \
                libxslt \
                rpm-build \
                perl \
                tar \
                curl
              dnf -y install wxGTK3-devel fop || true

              # Download OTP source
              curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
                -o otp_src.tar.gz
              tar xzf otp_src.tar.gz
              mv otp_src_${OTP_VERSION} otp_src

              # Build OTP
              cd otp_src
              export ERL_TOP=$(pwd)
              ./configure \
                --prefix=/usr/local \
                --enable-threads \
                --enable-smp-support \
                --enable-kernel-poll \
                --enable-ssl \
                --enable-dynamic-ssl-lib \
                --with-ssl \
                --enable-jit
              make -j$(nproc)
              make DESTDIR=$(pwd)/../install install

              # Create tarball
              cd ../install
              tar czf ../erlang-${OTP_VERSION}-linux-amd64.tar.gz .
              cd ..

              # Build RPM
              chmod +x scripts/build-rpm.sh
              ./scripts/build-rpm.sh ${OTP_VERSION} amd64 rocky9
              mv *.rpm erlang-${OTP_VERSION}-rocky9-amd64.rpm 2>/dev/null || true

              # Generate checksums
              sha256sum erlang-${OTP_VERSION}-linux-amd64.tar.gz > checksums-rocky9-amd64.txt
              sha256sum *.rpm >> checksums-rocky9-amd64.txt 2>/dev/null || true
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-rocky9-amd64
          path: |
            erlang-*.tar.gz
            *.rpm
            checksums-*.txt

  # ====================
  # Linux AMD64 Builds (CentOS Stream via Docker)
  # ====================
  build-centos-amd64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: quay.io/centos/centos:stream9
            distro: cs9
          - image: quay.io/centos/centos:stream10-development
            distro: cs10

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build in CentOS container
        run: |
          docker pull ${{ matrix.image }}
          docker run --rm -t \
            -v "$PWD:/src" -w /src \
            -e OTP_VERSION=${OTP_VERSION} \
            -e DISTRO=${{ matrix.distro }} \
            ${{ matrix.image }} bash -lc '
              set -euo pipefail

              # Clean and refresh repos
              dnf -y clean all
              dnf -y makecache --refresh

              # Enable CRB repo (needed for some devel packages)
              dnf -y install dnf-plugins-core
              dnf -y config-manager --set-enabled crb || true

              # Install build dependencies (--allowerasing to handle curl-minimal conflict)
              dnf -y install epel-release || true
              dnf -y install --allowerasing \
                gcc gcc-c++ make \
                autoconf \
                ncurses-devel \
                openssl-devel \
                mesa-libGL-devel \
                mesa-libGLU-devel \
                libpng-devel \
                libssh-devel \
                unixODBC-devel \
                libxslt \
                rpm-build \
                perl \
                tar \
                curl
              dnf -y install wxGTK3-devel fop || true

              # Download OTP source
              curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
                -o otp_src.tar.gz
              tar xzf otp_src.tar.gz
              mv otp_src_${OTP_VERSION} otp_src

              # Build OTP
              cd otp_src
              export ERL_TOP=$(pwd)
              ./configure \
                --prefix=/usr/local \
                --enable-threads \
                --enable-smp-support \
                --enable-kernel-poll \
                --enable-ssl \
                --enable-dynamic-ssl-lib \
                --with-ssl \
                --enable-jit
              make -j$(nproc)
              make DESTDIR=$(pwd)/../install install

              # Create tarball
              cd ../install
              tar czf ../erlang-${OTP_VERSION}-linux-amd64.tar.gz .
              cd ..

              # Build RPM
              chmod +x scripts/build-rpm.sh
              ./scripts/build-rpm.sh ${OTP_VERSION} amd64 ${DISTRO}
              mv *.rpm erlang-${OTP_VERSION}-${DISTRO}-amd64.rpm 2>/dev/null || true

              # Generate checksums
              sha256sum erlang-${OTP_VERSION}-linux-amd64.tar.gz > checksums-${DISTRO}-amd64.txt
              sha256sum *.rpm >> checksums-${DISTRO}-amd64.txt 2>/dev/null || true
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-${{ matrix.distro }}-amd64
          path: |
            erlang-*.tar.gz
            *.rpm
            checksums-*.txt

  # ====================
  # macOS Builds
  # ====================
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install autoconf openssl@3 wxwidgets fop

      - name: Download OTP source
        run: |
          curl -fSL "https://github.com/erlang/otp/releases/download/OTP-${OTP_VERSION}/otp_src_${OTP_VERSION}.tar.gz" \
            -o otp_src.tar.gz
          tar xzf otp_src.tar.gz
          mv otp_src_${OTP_VERSION} otp_src

      - name: Build OTP
        run: |
          cd otp_src
          export ERL_TOP=$(pwd)
          ./configure \
            --prefix=/usr/local \
            --enable-threads \
            --enable-smp-support \
            --enable-kernel-poll \
            --enable-ssl \
            --enable-dynamic-ssl-lib \
            --with-ssl=$(brew --prefix openssl@3) \
            --enable-jit
          make -j$(sysctl -n hw.ncpu)

      - name: Create tarball
        run: |
          cd otp_src
          make DESTDIR=$(pwd)/../install install
          cd ../install
          tar czf ../erlang-${OTP_VERSION}-darwin-${{ matrix.arch }}.tar.gz .

      - name: Generate checksums
        run: |
          shasum -a 256 erlang-${OTP_VERSION}-darwin-${{ matrix.arch }}.tar.gz > checksums-darwin-${{ matrix.arch }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erlang-macos-${{ matrix.arch }}
          path: |
            erlang-*.tar.gz
            checksums-*.txt

  # ====================
  # Create Release
  # ====================
  release:
    needs: [build-ubuntu-amd64, build-ubuntu-arm64, build-debian-amd64, build-rocky-amd64, build-centos-amd64, build-macos]
    if: ${{ !inputs.skip_release && always() && contains(needs.*.result, 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release/ \;

          # Deduplicate tarballs (keep one per OS/arch combination)
          cd release
          for arch in amd64 arm64; do
            files=$(ls erlang-*-linux-${arch}.tar.gz 2>/dev/null | wc -l)
            if [ "$files" -gt 1 ]; then
              first=$(ls erlang-*-linux-${arch}.tar.gz | head -1)
              for f in erlang-*-linux-${arch}.tar.gz; do
                if [ "$f" != "$first" ]; then
                  rm -f "$f"
                fi
              done
            fi
          done
          cd ..

      - name: Merge checksums
        run: |
          cat artifacts/*/checksums-*.txt | sort -u > release/SHA256SUMS

      - name: Update versions.json
        run: |
          if [ -f versions.json ]; then
            if ! jq -e ".versions | index(\"${OTP_VERSION}\")" versions.json > /dev/null; then
              jq ".versions += [\"${OTP_VERSION}\"] | .latest = \"${OTP_VERSION}\"" versions.json > versions.json.tmp
              mv versions.json.tmp versions.json
            fi
          else
            echo '{"versions": ["'"${OTP_VERSION}"'"], "latest": "'"${OTP_VERSION}"'"}' > versions.json
          fi
          cp versions.json release/

      - name: List release artifacts
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OTP-${{ env.OTP_VERSION }}
          name: Erlang/OTP ${{ env.OTP_VERSION }}
          body: |
            ## Erlang/OTP ${{ env.OTP_VERSION }}

            Pre-built binaries for multiple platforms.

            ### Quick Install

            ```bash
            curl -fsSL https://${{ github.repository_owner }}.github.io/erlang-dist/install.sh | sh -s -- ${{ env.OTP_VERSION }}
            ```

            ### Available Packages

            **Linux (amd64 & arm64):**
            - Ubuntu 22.04, 24.04 (.deb)
            - Debian 11, 12 (.deb)
            - Rocky Linux 9, CentOS Stream 9, 10 (.rpm)
            - Generic tarball

            **macOS:**
            - Intel (x86_64) tarball
            - Apple Silicon (arm64) tarball

            ### Verification

            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(env.OTP_VERSION, 'rc') }}

      - name: Trigger APT repository update
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: update-apt
          client-payload: '{"otp_version": "${{ env.OTP_VERSION }}"}'

      - name: Trigger RPM repository update
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: update-rpm
          client-payload: '{"otp_version": "${{ env.OTP_VERSION }}"}'
