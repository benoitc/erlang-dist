name: Check for New OTP Releases

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force build a specific version (optional)'
        required: false
        type: string

jobs:
  check-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          # Get our built versions
          if [ -f versions.json ]; then
            BUILT_VERSIONS=$(jq -r '.versions[]' versions.json 2>/dev/null | tr '\n' ' ')
          else
            BUILT_VERSIONS=""
          fi
          echo "Already built: $BUILT_VERSIONS"

          # Handle forced version
          if [ -n "$FORCE_VERSION" ]; then
            echo "Forcing build of version: $FORCE_VERSION"
            echo "new_versions=$FORCE_VERSION" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get ONLY the latest stable release for each major version (27, 28)
          # Skip RCs, alphas, betas - only stable releases
          LATEST_27=$(gh api repos/erlang/otp/releases --paginate -q '.[].tag_name' | grep '^OTP-27\.' | grep -v -E '(rc|alpha|beta)' | head -1 | sed 's/OTP-//')
          LATEST_28=$(gh api repos/erlang/otp/releases --paginate -q '.[].tag_name' | grep '^OTP-28\.' | grep -v -E '(rc|alpha|beta)' | head -1 | sed 's/OTP-//')

          echo "Latest OTP 27: $LATEST_27"
          echo "Latest OTP 28: $LATEST_28"

          NEW_VERSIONS=""

          # Check if we need to build latest 27
          if [ -n "$LATEST_27" ]; then
            if ! echo "$BUILT_VERSIONS" | grep -qw "$LATEST_27"; then
              echo "New version: $LATEST_27"
              NEW_VERSIONS="$LATEST_27"
            fi
          fi

          # Check if we need to build latest 28
          if [ -n "$LATEST_28" ]; then
            if ! echo "$BUILT_VERSIONS" | grep -qw "$LATEST_28"; then
              echo "New version: $LATEST_28"
              NEW_VERSIONS="$NEW_VERSIONS $LATEST_28"
            fi
          fi

          NEW_VERSIONS=$(echo "$NEW_VERSIONS" | xargs)  # Trim whitespace

          if [ -n "$NEW_VERSIONS" ]; then
            echo "New versions to build: $NEW_VERSIONS"
            echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "No new versions found"
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger builds for new versions
        if: steps.check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for VERSION in ${{ steps.check.outputs.new_versions }}; do
            echo "Triggering build for OTP $VERSION"
            gh workflow run build.yml -f otp_version="$VERSION"
          done

      - name: Summary
        run: |
          echo "## Release Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.has_new }}" == "true" ]; then
            echo "**New versions found:** ${{ steps.check.outputs.new_versions }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Build workflows have been triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "No new versions found." >> $GITHUB_STEP_SUMMARY
          fi
