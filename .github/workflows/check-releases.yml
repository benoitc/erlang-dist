name: Check for New OTP Releases

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force build a specific version (optional)'
        required: false
        type: string

jobs:
  check-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          # Get our built versions
          if [ -f versions.json ]; then
            BUILT_VERSIONS=$(jq -r '.versions[]' versions.json 2>/dev/null | tr '\n' ' ')
          else
            BUILT_VERSIONS=""
          fi
          echo "Already built: $BUILT_VERSIONS"

          # Handle forced version
          if [ -n "$FORCE_VERSION" ]; then
            echo "Forcing build of version: $FORCE_VERSION"
            echo "new_versions=$FORCE_VERSION" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get all stable releases (skip RCs, alphas, betas)
          ALL_RELEASES=$(gh api repos/erlang/otp/releases --paginate -q '.[].tag_name' | grep -E '^OTP-[0-9]+\.' | grep -v -E '(rc|alpha|beta)' | sed 's/OTP-//')

          # Find the two latest major versions (N and N-1)
          MAJOR_N=$(echo "$ALL_RELEASES" | cut -d. -f1 | sort -rn | uniq | head -1)
          MAJOR_N_1=$(echo "$ALL_RELEASES" | cut -d. -f1 | sort -rn | uniq | head -2 | tail -1)

          echo "Tracking major versions: $MAJOR_N (current) and $MAJOR_N_1 (previous)"

          # Get latest stable release for each major version
          LATEST_N=$(echo "$ALL_RELEASES" | grep "^${MAJOR_N}\." | head -1)
          LATEST_N_1=$(echo "$ALL_RELEASES" | grep "^${MAJOR_N_1}\." | head -1)

          echo "Latest OTP $MAJOR_N: $LATEST_N"
          echo "Latest OTP $MAJOR_N_1: $LATEST_N_1"

          NEW_VERSIONS=""

          # Check if we need to build latest N
          if [ -n "$LATEST_N" ]; then
            if ! echo "$BUILT_VERSIONS" | grep -qw "$LATEST_N"; then
              echo "New version: $LATEST_N"
              NEW_VERSIONS="$LATEST_N"
            fi
          fi

          # Check if we need to build latest N-1
          if [ -n "$LATEST_N_1" ]; then
            if ! echo "$BUILT_VERSIONS" | grep -qw "$LATEST_N_1"; then
              echo "New version: $LATEST_N_1"
              NEW_VERSIONS="$NEW_VERSIONS $LATEST_N_1"
            fi
          fi

          NEW_VERSIONS=$(echo "$NEW_VERSIONS" | xargs)  # Trim whitespace

          if [ -n "$NEW_VERSIONS" ]; then
            echo "New versions to build: $NEW_VERSIONS"
            echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "No new versions found"
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger builds for new versions
        if: steps.check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for VERSION in ${{ steps.check.outputs.new_versions }}; do
            echo "Triggering build for OTP $VERSION"
            gh workflow run build.yml -f otp_version="$VERSION"
          done

      - name: Summary
        run: |
          echo "## Release Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.has_new }}" == "true" ]; then
            echo "**New versions found:** ${{ steps.check.outputs.new_versions }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Build workflows have been triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "No new versions found." >> $GITHUB_STEP_SUMMARY
          fi
