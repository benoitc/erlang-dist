name: Test Packages

on:
  workflow_dispatch:
    inputs:
      otp_version:
        description: 'OTP version to test'
        required: true
        type: string
  workflow_run:
    workflows: ["Build Erlang/OTP"]
    types:
      - completed

env:
  OTP_VERSION: ${{ inputs.otp_version || '' }}

jobs:
  # Determine version to test from workflow_run
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - name: Get version from workflow_run
        id: get
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$OTP_VERSION" ]; then
            echo "version=$OTP_VERSION" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.workflow_run.head_branch }}" ]; then
            # Try to extract from release tag
            VERSION=$(gh api repos/${{ github.repository }}/releases/latest -q '.tag_name' | sed 's/OTP-//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "No version specified"
            exit 1
          fi

  # Test on Ubuntu/Debian with .deb
  test-deb:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            distro: ubuntu2204
          - image: ubuntu:24.04
            distro: ubuntu2404
          - image: debian:11
            distro: debian11
          - image: debian:12
            distro: debian12

    runs-on: ubuntu-latest
    container: ${{ matrix.image }}

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl ca-certificates

      - name: Download .deb package
        run: |
          curl -fSL "https://github.com/${{ github.repository }}/releases/download/OTP-${VERSION}/erlang-${VERSION}-${{ matrix.distro }}-amd64.deb" \
            -o erlang.deb || {
            echo "Package not found for ${{ matrix.distro }}, trying tarball..."
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/OTP-${VERSION}/erlang-${VERSION}-linux-amd64.tar.gz" \
              -o erlang.tar.gz
          }

      - name: Install package
        run: |
          if [ -f erlang.deb ]; then
            apt-get install -y ./erlang.deb || dpkg -i ./erlang.deb && apt-get install -f -y
          else
            mkdir -p /usr/local
            tar xzf erlang.tar.gz -C / --strip-components=0
          fi

      - name: Test Erlang
        run: |
          # Get installed version
          INSTALLED=$(erl -eval 'io:format("~s", [erlang:system_info(otp_release)]), halt().' -noshell)
          EXPECTED_MAJOR=$(echo "${VERSION}" | cut -d. -f1)

          echo "Installed OTP release: ${INSTALLED}"
          echo "Expected major version: ${EXPECTED_MAJOR}"

          if [ "${INSTALLED}" != "${EXPECTED_MAJOR}" ]; then
            echo "ERROR: Version mismatch! Expected ${EXPECTED_MAJOR}, got ${INSTALLED}"
            exit 1
          fi
          echo "✓ Version check passed"

          echo "Testing erlc..."
          erlc -version
          echo "✓ erlc works"

          echo "Testing escript..."
          escript -version
          echo "✓ escript works"

          echo "Testing crypto application..."
          erl -eval 'crypto:start(), io:format("crypto: ok~n"), halt().' -noshell
          echo "✓ crypto works"

          echo "Testing ssl application..."
          erl -eval 'ssl:start(), io:format("ssl: ok~n"), halt().' -noshell
          echo "✓ ssl works"

          echo "Testing compilation..."
          echo '-module(test). -export([hello/0]). hello() -> "Hello from OTP ${VERSION}".' > /tmp/test.erl
          erlc -o /tmp /tmp/test.erl
          erl -pa /tmp -eval 'io:format("~s~n", [test:hello()]), halt().' -noshell
          echo "✓ Compilation works"

          echo ""
          echo "All tests passed for ${{ matrix.distro }}!"

  # Test on Rocky/CentOS with .rpm
  test-rpm:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rockylinux:9
            distro: rocky9
            name: Rocky Linux 9
          - image: quay.io/centos/centos:stream9
            distro: cs9
            name: CentOS Stream 9
          - image: quay.io/centos/centos:stream10-development
            distro: cs10
            name: CentOS Stream 10

    runs-on: ubuntu-latest
    container: ${{ matrix.image }}

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Install dependencies
        run: |
          dnf install -y --allowerasing curl

      - name: Download .rpm package
        run: |
          curl -fSL "https://github.com/${{ github.repository }}/releases/download/OTP-${VERSION}/erlang-${VERSION}-${{ matrix.distro }}-amd64.rpm" \
            -o erlang.rpm || {
            echo "Package not found for ${{ matrix.distro }}, trying tarball..."
            curl -fSL "https://github.com/${{ github.repository }}/releases/download/OTP-${VERSION}/erlang-${VERSION}-linux-amd64.tar.gz" \
              -o erlang.tar.gz
          }

      - name: Install package
        run: |
          if [ -f erlang.rpm ]; then
            dnf install -y ./erlang.rpm || rpm -ivh --nodeps ./erlang.rpm
          else
            mkdir -p /usr/local
            tar xzf erlang.tar.gz -C / --strip-components=0
          fi

      - name: Test Erlang
        run: |
          # Get installed version
          INSTALLED=$(/usr/local/bin/erl -eval 'io:format("~s", [erlang:system_info(otp_release)]), halt().' -noshell)
          EXPECTED_MAJOR=$(echo "${VERSION}" | cut -d. -f1)

          echo "Installed OTP release: ${INSTALLED}"
          echo "Expected major version: ${EXPECTED_MAJOR}"

          if [ "${INSTALLED}" != "${EXPECTED_MAJOR}" ]; then
            echo "ERROR: Version mismatch! Expected ${EXPECTED_MAJOR}, got ${INSTALLED}"
            exit 1
          fi
          echo "✓ Version check passed"

          echo "Testing erlc..."
          /usr/local/bin/erlc -version
          echo "✓ erlc works"

          echo "Testing crypto application..."
          /usr/local/bin/erl -eval 'crypto:start(), io:format("crypto: ok~n"), halt().' -noshell
          echo "✓ crypto works"

          echo "Testing ssl application..."
          /usr/local/bin/erl -eval 'ssl:start(), io:format("ssl: ok~n"), halt().' -noshell
          echo "✓ ssl works"

          echo "Testing compilation..."
          echo '-module(test). -export([hello/0]). hello() -> "Hello from OTP".' > /tmp/test.erl
          /usr/local/bin/erlc -o /tmp /tmp/test.erl
          /usr/local/bin/erl -pa /tmp -eval 'io:format("~s~n", [test:hello()]), halt().' -noshell
          echo "✓ Compilation works"

          echo ""
          echo "All tests passed for ${{ matrix.name }}!"

  # Test on macOS with tarball
  test-macos:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-12
            arch: x86_64
            name: macOS Intel
          - os: macos-14
            arch: arm64
            name: macOS Apple Silicon

    runs-on: ${{ matrix.os }}

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Download tarball
        run: |
          curl -fSL "https://github.com/${{ github.repository }}/releases/download/OTP-${VERSION}/erlang-${VERSION}-darwin-${{ matrix.arch }}.tar.gz" \
            -o erlang.tar.gz

      - name: Extract and install
        run: |
          sudo mkdir -p /usr/local
          sudo tar xzf erlang.tar.gz -C / --strip-components=0

      - name: Test Erlang
        run: |
          # Get installed version
          INSTALLED=$(erl -eval 'io:format("~s", [erlang:system_info(otp_release)]), halt().' -noshell)
          EXPECTED_MAJOR=$(echo "${VERSION}" | cut -d. -f1)

          echo "Installed OTP release: ${INSTALLED}"
          echo "Expected major version: ${EXPECTED_MAJOR}"

          if [ "${INSTALLED}" != "${EXPECTED_MAJOR}" ]; then
            echo "ERROR: Version mismatch! Expected ${EXPECTED_MAJOR}, got ${INSTALLED}"
            exit 1
          fi
          echo "✓ Version check passed"

          echo "Testing erlc..."
          erlc -version
          echo "✓ erlc works"

          echo "Testing escript..."
          escript -version
          echo "✓ escript works"

          echo "Testing crypto application..."
          erl -eval 'crypto:start(), io:format("crypto: ok~n"), halt().' -noshell
          echo "✓ crypto works"

          echo "Testing ssl application..."
          erl -eval 'ssl:start(), io:format("ssl: ok~n"), halt().' -noshell
          echo "✓ ssl works"

          echo "Testing compilation..."
          echo '-module(test). -export([hello/0]). hello() -> "Hello from OTP".' > /tmp/test.erl
          erlc -o /tmp /tmp/test.erl
          erl -pa /tmp -eval 'io:format("~s~n", [test:hello()]), halt().' -noshell
          echo "✓ Compilation works"

          echo ""
          echo "All tests passed for ${{ matrix.name }}!"

  # Summary job
  summary:
    needs: [test-deb, test-rpm, test-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| DEB (Ubuntu/Debian) | ${{ needs.test-deb.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RPM (Rocky/CentOS) | ${{ needs.test-rpm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.test-macos.result }} |" >> $GITHUB_STEP_SUMMARY
